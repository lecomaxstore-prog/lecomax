<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting…</title>
  <script>
    (function () {
      var path = window.location.pathname || '/';
      var parts = path.split('/').filter(Boolean);

      if (parts.length && parts[parts.length - 1].toLowerCase() === '404.html') {
        parts.pop();
      }

      var base = '/';
      if (parts.length) {
        base = '/' + parts[0] + '/';
      }

      var target = base + 'index.html' + (window.location.search || '') + (window.location.hash || '');
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>Redirecting…</p>
</body>
</html>
